<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Walker Privacy Policy in English and Russian.">

  <title>Privacy Policy — Walker</title>

  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../styles.css">
</head>

<body class="legal-page" data-document="privacy" data-title-en="Privacy Policy" data-title-ru="Политика конфиденциальности">
  <div class="container">
    <header class="topbar">
      <a class="brand-link" href="/walker/" aria-label="Back to Walker home">
        <img src="../assets/logo.png" width="274" height="90" alt="Walker">
      </a>
      <div class="topbar__actions">
        <a class="chip chip--ghost" href="../terms-of-use/">Terms_of_Use</a>
        <button id="themeToggle" class="chip chip--button" aria-label="Toggle between light and dark themes">
          Toggle_Theme
        </button>
      </div>
    </header>

    <main class="legal-main">
      <section class="legal-hero">
        <p class="hero__eyebrow">Walker legal</p>
        <h1 class="section__title" data-legal-heading>Privacy Policy</h1>
        <p class="legal-hero__description">
          Updated on March 9, 2026. This page is the current Walker privacy policy location under
          <span class="highlight">gaivoronskii.com/walker</span>.
        </p>

        <div class="legal-toolbar">
          <div class="language-switcher" role="tablist" aria-label="Document language">
            <button class="language-switcher__button is-active" type="button" data-language="en">English</button>
            <button class="language-switcher__button" type="button" data-language="ru">Русский</button>
          </div>
          <div class="status-row">
            <span id="documentStatus" class="status-pill">English version</span>
            <a href="mailto:andrei@gaivoronskii.com">andrei@gaivoronskii.com</a>
          </div>
        </div>
      </section>

      <article class="legal-card">
        <div id="legalContent" class="legal-content" aria-live="polite"></div>
      </article>
    </main>

    <footer class="footer footer--legal">
      <div class="footer__left">
        <span>&copy; <span data-current-year></span> Walker</span>
        <span class="footer__dot">·</span>
        <a href="/walker/">walker home</a>
      </div>
      <div class="footer__right">
        <a href="../terms-of-use/">Terms of Use</a>
      </div>
    </footer>
  </div>

  <script src="../script.js"></script>
</body>
</html>
